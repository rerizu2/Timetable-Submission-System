<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #4285f4; --bg: #f8fafc; --header-bg: #1e293b; --pink: #db2777; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); color: #333; overflow: hidden; }

    /* ログイン画面のカードスタイル */
    #login-screen { position: fixed; inset: 0; background: #f1f5f9; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; padding: 40px; border-radius: 20px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
    
    /* ヘッダー */
    #app-box { display: none; flex-direction: column; height: 100vh; }
    .header { background: var(--header-bg); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
    
    /* サイドバー */
    .main-wrapper { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; overflow-y: auto; }
    .view-area { flex: 1; padding: 20px; overflow-y: auto; background: white; }

    /* 入力パーツ */
    .input-ui { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; background: #f8fafc; }
    .btn-blue { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
    .btn-pink { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    
    /* 時間割テーブル */
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #e2e8f0; padding: 15px; text-align: center; }
    .card { background: #eff6ff; border-left: 4px solid var(--primary); padding: 5px; border-radius: 4px; font-size: 12px; text-align: left; }

    .nav-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; font-size: 12px; }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div class="login-card">
      <h2 style="margin-bottom: 25px;">School Login</h2>
      <input type="text" id="l-sn" class="input-ui" placeholder="6桁の学校番号" oninput="handleSchoolNoInput(this.value)">
      <select id="l-role" class="input-ui" onchange="onRoleChange()">
        <option value="生徒">生徒</option>
        <option value="教員">教員</option>
        <option value="管理者">管理者</option>
      </select>
      <select id="uid-select" class="input-ui"></select>
      <input type="password" id="l-pw" class="input-ui" placeholder="パスワード">
      <button class="btn-blue" onclick="doLogin()">ログイン</button>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="app-box">
    <div class="header">
      <div id="h-school-name">---</div>
      <div id="clock">00:00:00</div>
      <div>
        <button class="nav-btn">日</button>
        <button class="nav-btn">週</button>
        <button class="nav-btn" style="background:#db2777;" onclick="location.reload()">ログアウト</button>
      </div>
    </div>
    <div class="main-wrapper">
      <div class="sidebar">
        <label style="font-size: 12px; font-weight: bold; color: #64748b;">表示クラス</label>
        <select id="class-filter" class="input-ui" onchange="render()"></select>
        <hr style="opacity: 0.1; margin: 20px 0;">
        <button class="btn-blue">制作へ連絡</button>
        <button class="btn-blue" onclick="alert('時刻設定を開く')">時刻設定</button>
        <button class="btn-blue" onclick="alert('ユーザー管理を開く')">ユーザー管理</button>
        
        <div style="margin-top: 20px;">
          <label style="font-size: 12px; font-weight: bold; color: #64748b;">提出物登録</label>
          <input type="date" id="t-date" class="input-ui">
          <input type="text" id="t-sub" class="input-ui" placeholder="科目名">
          <input type="text" id="t-con" class="input-ui" placeholder="内容">
          <select id="t-class" class="input-ui"></select>
          <button class="btn-pink" onclick="onAddTask()">登録</button>
        </div>
      </div>
      <div id="view-area" class="view-area"></div>
    </div>
  </div>

<script>
  // --- ここにデプロイ後のURLを貼り付けてください ---
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyVZHereQTw4DAxSAuU_6N-x6ob7dtGMtdtkeNzZFVcpfN5YgSTd97RbkNPAr-KYLPjsA/exec";

  async function callGas(action, data = {}) {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, data }) });
    return await res.json();
  }

  let currentSn = "", classList = [], schedule = [], focusD = new Date();

  async function handleSchoolNoInput(val) {
    if (val.length === 6) {
      const res = await callGas('getLoginConfig', { sn: val });
      document.getElementById('uid-select').innerHTML = res.classList.map(c => `<option value="${c}">${c}</option>`).join('');
    }
  }

  async function doLogin() {
    const sn = document.getElementById('l-sn').value;
    const role = document.getElementById('l-role').value;
    const id = document.getElementById('uid-select').value;
    const pw = document.getElementById('l-pw').value;
    
    const res = await callGas('checkLogin', { sn, id, pw, role });
    if (res.success) {
      currentSn = sn;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-box').style.display = 'flex';
      document.getElementById('h-school-name').innerText = res.schoolName;
      refresh();
    } else {
      alert(res.message);
    }
  }

  async function refresh() {
    const app = await callGas('getFullAppData', { sn: currentSn });
    const sch = await callGas('getScheduleData', { sn: currentSn });
    classList = app.classList;
    schedule = sch;
    
    document.getElementById('class-filter').innerHTML = '<option value="すべて">すべて</option>' + classList.map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById('t-class').innerHTML = classList.map(c => `<option value="${c}">${c}</option>`).join('');
    render();
  }

  function render() {
    const filter = document.getElementById('class-filter').value;
    const start = new Date(focusD);
    start.setDate(start.getDate() - (start.getDay() || 7) + 1);
    
    let h = '<table><tr><th>限</th>';
    for(let i=0; i<5; i++) {
      let d = new Date(start); d.setDate(start.getDate() + i);
      h += `<th>${d.getMonth()+1}/${d.getDate()}</th>`;
    }
    h += '</tr>';

    for(let p=1; p<=6; p++) {
      h += `<tr><td>${p}</td>`;
      for(let i=0; i<5; i++) {
        let d = new Date(start); d.setDate(start.getDate() + i);
        let s = d.toLocaleDateString('sv-SE');
        const its = schedule.filter(x => x.date === s && x.period == p && (filter === 'すべて' || x.targetClass === filter));
        h += `<td onclick="onAddEntry('${s}',${p})">${its.map(it => `<div class="card">${it.subject}</div>`).join('')}</td>`;
      }
      h += '</tr>';
    }
    document.getElementById('view-area').innerHTML = h + '</table>';
  }

  async function onAddTask() {
    const date = document.getElementById('t-date').value;
    const sub = document.getElementById('t-sub').value;
    const con = document.getElementById('t-con').value;
    const cl = document.getElementById('t-class').value;
    await callGas('saveSubmission', { sn: currentSn, date, sub, con, cl });
    alert("登録しました");
  }

  async function onAddEntry(d, p) {
    const s = prompt("科目名を入力");
    const cl = document.getElementById('class-filter').value;
    if (s && cl !== "すべて") {
      await callGas('saveEntry', { sn: currentSn, d, p, s, role: "教員", cl });
      refresh();
    }
  }

  function onRoleChange() {
    const r = document.getElementById('l-role').value;
    document.getElementById('uid-select').style.display = (r === '生徒' ? 'block' : 'none');
  }

  setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
  }, 1000);
</script>
</body>
</html>
