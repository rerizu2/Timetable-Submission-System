<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeTable Pro</title>
  <style>
    :root { --primary: #4285f4; --bg: #f8fafc; --header-bg: #1e293b; --pink: #db2777; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; }
    
    /* ログイン画面 */
    #login-screen { width: 100%; }
    .login-card { background-color: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; margin: 0 auto; }
    .login-card h2 { margin: 0 0 25px 0; font-size: 20px; color: #333; font-weight: bold; }
    .login-card label { display: block; text-align: left; font-size: 12px; color: #888; margin-bottom: 8px; margin-left: 5px; }
    .input-ui { width: 100%; padding: 12px 16px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .input-ui:focus { border-color: var(--primary); outline: none; }
    .btn-login { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .back-link { display: block; margin-top: 15px; font-size: 14px; color: #666; text-decoration: none; cursor: pointer; }

    /* メインアプリ画面 */
    #app-box { display: none; width: 100%; height: 100vh; flex-direction: column; background: white; }
    .header { background: var(--header-bg); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
    .main-wrapper { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; overflow-y: auto; }
    .view-area { flex: 1; padding: 20px; overflow-y: auto; }
    .btn-blue { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; }
    .btn-pink { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #e2e8f0; padding: 15px; text-align: center; }
    .card { background: #eff6ff; border-left: 4px solid var(--primary); padding: 5px; border-radius: 4px; font-size: 12px; text-align: left; }
    .nav-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <div class="login-card">
      <h2>School Login</h2>
      <input type="number" id="l-sn" class="input-ui" placeholder="学校番号" oninput="handleSchoolNoInput(this.value)">
      <label>クラス選択</label>
      <select id="uid-select" class="input-ui">
        <option value="">学校番号を入力してください</option>
      </select>
      <button class="btn-login" onclick="doLogin()">ログイン</button>
      <a class="back-link">戻る</a>
    </div>
  </div>

  <!-- メインアプリ画面 -->
  <div id="app-box">
    <div class="header">
      <div id="h-school-name">---</div>
      <div id="clock">00:00:00</div>
      <div>
        <button class="nav-btn">日</button>
        <button class="nav-btn">週</button>
        <button class="nav-btn" style="background:#db2777;" onclick="location.reload()">ログアウト</button>
      </div>
    </div>
    <div class="main-wrapper">
      <div class="sidebar">
        <label>表示クラス</label>
        <select id="class-filter" class="input-ui" onchange="render()"></select>
        <hr style="opacity:0.1; margin: 20px 0;">
        <button class="btn-blue">制作へ連絡</button>
        <button class="btn-blue">時刻設定</button>
        <button class="btn-blue" onclick="openM('user')">ユーザー管理</button>
        <div style="margin-top:20px;">
          <label>提出物登録</label>
          <input type="date" id="t-date" class="input-ui">
          <input type="text" id="t-sub" class="input-ui" placeholder="科目名">
          <input type="text" id="t-con" class="input-ui" placeholder="内容">
          <select id="t-class" class="input-ui"></select>
          <button class="btn-pink" onclick="onAddTask()">登録</button>
        </div>
      </div>
      <div id="view-area" class="view-area"></div>
    </div>
  </div>

<script>
  // ★重要：ご自身のGASウェブアプリURLに書き換えてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyDvjfeMzDlSF-b98PE3T0J-Rf_vNfoUNRRWslFCxtljwBVlc54cAsV2Xtcg9EngHjaew/exec";

  async function callGas(action, data = {}) {
    try {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, data }) });
      return await res.json();
    } catch (e) { console.error("通信エラー:", e); return { success: false, message: "通信に失敗しました" }; }
  }

  let currentSn = "", classList = [], schedule = [], focusD = new Date();

  async function handleSchoolNoInput(val) {
    if (val.length === 6) {
      const select = document.getElementById('uid-select');
      select.innerHTML = '<option>読込中...</option>';
      const res = await callGas('getLoginConfig', { sn: val });
      if (res && res.classList.length > 0) {
        select.innerHTML = res.classList.map(c => `<option value="${c}">${c}</option>`).join('');
      } else {
        select.innerHTML = '<option>クラスがありません</option>';
      }
    }
  }

  async function doLogin() {
    const sn = document.getElementById('l-sn').value;
    const id = document.getElementById('uid-select').value;
    if (!sn || !id) return alert("学校番号とクラスを選択してください");
    
    const res = await callGas('checkLogin', { sn, id, role: '生徒' });
    if (res.success) {
      currentSn = sn;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-box').style.display = 'flex';
      document.getElementById('h-school-name').innerText = res.schoolName;
      refresh();
    } else {
      alert(res.message || "ログイン失敗");
    }
  }

  async function refresh() {
    const app = await callGas('getFullAppData', { sn: currentSn });
    const sch = await callGas('getScheduleData', { sn: currentSn });
    classList = app.classList;
    schedule = sch;
    document.getElementById('class-filter').innerHTML = '<option value="すべて">すべて</option>' + classList.map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById('t-class').innerHTML = classList.map(c => `<option value="${c}">${c}</option>`).join('');
    render();
  }

  function render() {
    const filter = document.getElementById('class-filter').value;
    const start = new Date(focusD);
    start.setDate(start.getDate() - (start.getDay() || 7) + 1);
    
    let h = '<table><tr><th>限</th>';
    for(let i=0; i<5; i++) {
      let d = new Date(start); d.setDate(start.getDate() + i); h += `<th>${d.getMonth()+1}/${d.getDate()}</th>`;
    }
    h += '</tr>';

    for(let p=1; p<=6; p++) {
      h += `<tr><td>${p}限</td>`;
      for(let i=0; i<5; i++) {
        let d = new Date(start); d.setDate(start.getDate() + i); let s = d.toLocaleDateString('sv-SE');
        const its = schedule.filter(x => x.date === s && x.period == p && (filter === 'すべて' || x.targetClass === filter));
        h += `<td onclick="onAddEntry('${s}',${p})">${its.map(it => `<div class="card">${it.subject}</div>`).join('')}</td>`;
      }
      h += '</tr>';
    }
    document.getElementById('view-area').innerHTML = h + '</table>';
  }

  async function onAddTask() {
    await callGas('saveSubmission', { sn: currentSn, date:document.getElementById('t-date').value, subject:document.getElementById('t-sub').value, content:document.getElementById('t-con').value, targetClass:document.getElementById('t-class').value });
    alert("登録しました");
  }

  async function onAddEntry(d, p) {
    const s = prompt("科目名を入力"); const cl = document.getElementById('class-filter').value;
    if (s && cl !== "すべて") { await callGas('saveEntry', { sn: currentSn, d, p, s, role: "教員", cl }); refresh(); }
  }

  setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>

</body>
</html>
