<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --primary: #5851db; --bg: #f8fafc; --header-bg: #1e293b; --card-bg: #ffffff; --border: #eef2f6; --text-main: #1e293b; --text-sub: #64748b; --badge-bg: #eff6ff; --badge-text: #2563eb; --pink: #db2777; }
    #landing-box, #setup-box, #complete-box, #login-box, #app-box, .modal-overlay, #save-loader { display: none; }
    
    body.theme-glass { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-attachment: fixed; }
    body.theme-glass #app-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); color: #fff; }
    body.theme-glass .sidebar { background: rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); color: #fff; }
    body.theme-glass table, body.theme-glass th, body.theme-glass td { border-color: rgba(255,255,255,0.1); color: #fff; }
    body.theme-glass th { background: rgba(0,0,0,0.2); }

    body { margin: 0; font-family: sans-serif; background: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .box-ui { background: white; padding: 40px; border-radius: 20px; width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    .input-ui { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
    .btn-blue { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-pink { width: 100%; padding: 10px; background: var(--pink); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }

    #app-box { width: 98%; height: 96vh; background: white; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    .header { background: var(--header-bg); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
    .digital-clock { font-family: monospace; background: rgba(0,0,0,0.3); padding: 4px 12px; border-radius: 8px; font-size: 20px; }
    .main-content { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; color: #333; }
    .view-area { flex: 1; padding: 30px; overflow-y: auto; position: relative; }

    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; vertical-align: top; }
    th { background: #f8fafc; font-size: 12px; }
    .card { padding: 8px; border-radius: 8px; border-left: 5px solid var(--primary); font-size: 12px; margin-bottom: 5px; background: #eff6ff; color: #1e293b; font-weight: bold; text-align: left; cursor: pointer; }

    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .dashboard-card { background: #fff; border-radius: 20px; padding: 25px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; color: #333; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .modal { background: white; padding: 35px; border-radius: 25px; width: 600px; max-height: 85vh; overflow-y: auto; color: #333; }
    #save-loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; color: var(--primary); font-weight: bold; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="theme-glass">

  <div id="landing-box" class="box-ui"><i class="fa-solid fa-graduation-cap" style="font-size:55px; color:var(--primary);"></i><h2>TimeTable Pro</h2><button class="btn-blue" onclick="showSection('setup')">新規校作成</button><button class="btn-blue" style="background:#64748b;" onclick="showSection('login')">既存校ログイン</button></div>
  <div id="setup-box" class="box-ui"><h3>学校登録</h3><input type="text" id="s-school" class="input-ui" placeholder="学校名"><input type="text" id="s-admin-id" class="input-ui" placeholder="管理者ID"><input type="password" id="s-admin-pw" class="input-ui" placeholder="管理者PW"><button class="btn-blue" onclick="doSetup()">作成</button><br><span onclick="showSection('landing')" style="cursor:pointer; font-size:13px;">戻る</span></div>
  <div id="complete-box" class="box-ui"><h3>作成完了</h3><h1 id="res-school-no">000000</h1><button class="btn-blue" onclick="showSection('login')">ログインへ</button></div>

  <div id="login-box" class="box-ui">
    <div style="font-size:24px; font-weight:bold; margin-bottom:20px;">学生ポータル</div>
    <input type="number" id="l-school-no" class="input-ui" placeholder="学校番号" oninput="handleSchoolNoInput(this.value)">
    <div id="role-selector-container" style="display:none;"><select id="l-role" class="input-ui" onchange="onRoleChange()"><option value="生徒" selected>生徒</option><option value="教員">教員</option><option value="管理者">管理者</option></select></div>
    <div id="id-area"><div id="uid-select-wrapper"><label style="font-size:11px;">クラス選択</label><select id="uid-select" class="input-ui"></select></div><div id="uid-text-wrapper" style="display:none;"><label style="font-size:11px;">ユーザーID</label><input type="text" id="uid-text" class="input-ui"></div></div>
    <div id="pw-area" style="display:none;"><input type="password" id="upw" class="input-ui" placeholder="Password"></div>
    <button class="btn-blue" onclick="doLogin()">ログイン</button><br><span onclick="showSection('landing')" style="cursor:pointer; font-size:13px;">戻る</span>
  </div>

  <div id="app-box">
    <div class="header">
      <div style="display:flex; align-items:center;">
        <div style="font-size:11px; margin-right:25px; text-align:left;"><b id="h-school-name">---</b><br><small id="h-school-no">No.---</small></div>
        <div id="digital-clock" class="digital-clock">00:00:00</div>
        <div id="nav-controls" style="margin-left:20px;"><button onclick="move(-1)" class="nav-btn" style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid #fff; padding:5px 10px; border-radius:5px;">＜</button><span id="date-label" style="margin:0 15px; font-weight:bold; min-width:130px; text-align:center;"></span><button onclick="move(1)" class="nav-btn" style="background:rgba(255,255,255,0.1); color:#fff; border:1px solid #fff; padding:5px 10px; border-radius:5px;">＞</button></div>
      </div>
      <div>
        <button id="btn-day" onclick="changeV('day')" class="nav-btn" style="padding:5px 10px; border-radius:5px; cursor:pointer;">日</button><button id="btn-week" onclick="changeV('week')" class="nav-btn" style="padding:5px 10px; border-radius:5px; cursor:pointer;">週</button>
        <button id="btn-task" onclick="changeV('task')" class="nav-btn" style="background:#f43f5e; border:none; color:#fff; margin-left:10px; padding:5px 10px; border-radius:5px; cursor:pointer;">提出状況</button>
        <!-- ショートカット追加：ポータル -->
        <button onclick="window.open('https://script.google.com/macros/s/AKfycbxGhayJqPsF50e4F_l_Y-xtb4TdrqZTLfSjcySPs_UMy0AgxifL1r4uhMgpyZ0nWHzoQQ/exec', '_blank')" class="nav-btn" style="background:#4f46e5; border:none; color:#fff; margin-left:10px; padding:5px 10px; border-radius:5px; cursor:pointer;"><i class="fa-solid fa-link"></i> ポータル</button>
        
        <button id="btn-admin-status" onclick="changeV('admin-status')" class="nav-btn" style="background:#10b981; border:none; color:#fff; display:none; margin-left:10px; padding:5px 10px; border-radius:5px; cursor:pointer;">状況確認</button>
        <button onclick="location.reload()" class="nav-btn" style="background:#ef4444; border:none; margin-left:15px; padding:5px 10px; border-radius:5px; cursor:pointer;"><i class="fa-solid fa-power-off"></i></button>
      </div>
    </div>
    <div class="main-content">
      <div class="sidebar" id="admin-sidebar">
        <label style="font-size:11px; font-weight:bold;">表示クラス切替</label><select id="sidebar-class-filter" class="input-ui" onchange="render();"></select>
        <button class="btn-blue" style="background:#8b5cf6;" onclick="openM('subject')">教科管理</button>
        <hr style="margin:25px 0; opacity:0.1;">
        <div id="side-admin-only" style="display:none;">
          <div style="margin-top:15px; padding:12px; background:rgba(0,0,0,0.05); border-radius:12px;"><label style="font-size:11px;">クラス追加</label><input type="text" id="nc-name" class="input-ui" placeholder="例: 1年A組"><button class="btn-pink" onclick="onAddClass()">追加</button><div id="side-class-list" style="font-size:11px; margin-top:10px;"></div></div>
        </div>
      </div>
      <div id="view-area" class="view-area"><div id="save-loader"><div class="spinner"></div>処理中...</div></div>
    </div>
  </div>

  <div class="modal-overlay" id="overlay-subject"><div class="modal"><h3>教科管理</h3><input type="text" id="new-sub-name" class="input-ui"><button class="btn-blue" onclick="onAddSubject()">追加</button><hr><div id="sub-list-box"></div><button class="btn-blue" style="background:#ccc;" onclick="closeM()">閉じる</button></div></div>
  <div class="modal-overlay" id="overlay-edit"><div class="modal"><h3>編集</h3><input type="text" id="m-subject" class="input-ui" placeholder="科目名"><input type="text" id="m-room" class="input-ui" placeholder="教室名"><button class="btn-blue" onclick="onSave()">保存</button><button class="btn-blue" style="background:red;" onclick="onDelete()">削除</button><button class="btn-blue" style="background:#ccc;" onclick="closeM()">閉じる</button></div></div>

<script>
  // --- GAS接続用URL ---
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyzA1pj3nGIGOCyA16R8Fuwc-4bFpFCchD41WEAn5j1DKBajPApyNkYQK1BU7VoKEFZ-w/exec"; 
  const PORTAL_URL = "https://script.google.com/macros/s/AKfycbxGhayJqPsF50e4F_l_Y-xtb4TdrqZTLfSjcySPs_UMy0AgxifL1r4uhMgpyZ0nWHzoQQ/exec";

  async function callGas(action, data = {}) {
    try {
      const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, data }) });
      return await res.json();
    } catch(e) { console.error(e); return { success: false, message: "通信エラー" }; }
  }

  let db=[], tasks=[], appConfig={}, focusD=new Date(), mode='week', adminSubMode='menu', userRole="生徒", studentClass="", currentLoginId="", currentSchoolNo="", selectedSubject="";
  let currentStudentName = localStorage.getItem("studentName") || "";
  let currentStudentAttNo = localStorage.getItem("studentAttNo") || "";

  window.onload = async () => { 
    const s = await callGas('getAppStatus');
    showSection(s.isSetup ? 'login' : 'landing');
    setInterval(clock,1000); 
  };

  function clock(){ const n=new Date(); document.getElementById('digital-clock').innerText=`${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`; }
  function showSection(s){ document.querySelectorAll('.box-ui, #app-box, .modal-overlay').forEach(el=>el.style.display='none'); const t=document.getElementById(s+'-box'); if(t) t.style.display=(s==='app'?'flex':'block'); }
  function openM(m, d, p){ 
    document.getElementById('overlay-'+m).style.display='flex'; 
    if(m==='subject') loadSubjects(); 
    if(m==='edit'){
      window.curE = {d, p};
      const it = db.find(x => x.date === d && String(x.period) === String(p) && x.targetClass === document.getElementById('sidebar-class-filter').value);
      document.getElementById('m-subject').value = it ? it.subject : "";
      document.getElementById('m-room').value = it ? it.room : "";
    }
  }
  function closeM(){ document.querySelectorAll('.modal-overlay').forEach(el=>el.style.display='none'); }

  window.addEventListener('keydown',(e)=>{ if(e.ctrlKey&&e.altKey&&e.key.toLowerCase()==='i') document.getElementById('role-selector-container').style.display='block'; });
  
  async function handleSchoolNoInput(val){ 
    if(val.length===6) {
      const c = await callGas('getLoginConfig', { sn: val });
      document.getElementById('uid-select').innerHTML=c.classList.map(x=>`<option value="${x}">${x}</option>`).join(''); 
      document.getElementById('pw-area').style.display=(c.isStudentPwOn==='ON'?'block':'none'); 
    }
  }

  function onRoleChange(){ const r=document.getElementById('l-role').value, isS=(r==='生徒'); document.getElementById('uid-text-wrapper').style.display=isS?'none':'block'; document.getElementById('uid-select-wrapper').style.display=isS?'block':'none'; document.getElementById('pw-area').style.display=isS?'none':'block'; }

  async function doLogin(){
    const sn=document.getElementById('l-school-no').value, r=document.getElementById('l-role').value, pw=document.getElementById('upw').value;
    let id=(r==='生徒'?document.getElementById('uid-select').value : document.getElementById('uid-text').value);
    const res = await callGas('checkLogin', { sNo: sn, id, pw, role: r });
    if(res.success){ 
      userRole=r; currentLoginId=id; currentSchoolNo=sn; studentClass=(r==='生徒'?id:document.getElementById('uid-select').value); 
      showSection('app'); 
      document.getElementById('h-school-name').innerText=res.schoolName; 
      document.getElementById('h-school-no').innerText="No."+sn; 
      applyPerms(); refresh(); 
    } else alert(res.message);
  }

  function applyPerms(){ 
    const isA=(userRole==='管理者'), isS=(userRole==='生徒'), isT=(userRole==='教員'); 
    document.getElementById('admin-sidebar').style.display=isS?'none':'block'; 
    document.getElementById('side-admin-only').style.display=isA?'block':'none'; 
    document.getElementById('btn-admin-status').style.display=(isA || isT ?'inline-block':'none'); 
  }
  
  async function refresh(){
    appConfig = await callGas('getFullAppData', { sn: currentSchoolNo });
    document.getElementById('sidebar-class-filter').innerHTML=(userRole!=='生徒'?'<option value="すべて">すべて</option>':'')+appConfig.classList.map(c=>`<option value="${c}">${c}</option>`).join('');
    db = await callGas('getScheduleData', { sn: currentSchoolNo });
    render();
  }

  function render(){
    const area=document.getElementById('view-area'), f=(userRole==='生徒'?studentClass:document.getElementById('sidebar-class-filter').value);
    document.getElementById('date-label').innerText = focusD.toLocaleDateString();
    
    if(mode === 'task') { renderTaskView(); return; }
    if(mode === 'admin-status') {
      if(adminSubMode==='menu') area.innerHTML = `<div class="menu-grid">
        <div class="dashboard-card" onclick="loadMatrixData()"><div style="font-size:24px; margin-right:15px; color:blue;"><i class="fa-solid fa-table"></i></div><div><b>状況確認管理</b><br><small>名簿連動</small></div></div>
        <div class="dashboard-card" onclick="loadEditMeta()"><div style="font-size:24px; margin-right:15px; color:orange;"><i class="fa-solid fa-edit"></i></div><div><b>課題項目編集</b><br><small>項目・締切設定</small></div></div>
        <div class="dashboard-card" onclick="window.open('${PORTAL_URL}', '_blank')"><div style="font-size:24px; margin-right:15px; color:#4f46e5;"><i class="fa-solid fa-link"></i></div><div><b>外部ポータル</b><br><small>別窓で開く</small></div></div>
      </div>`;
      else if(adminSubMode==='matrix') renderMatrixView(f);
      else if(adminSubMode==='edit') renderEditMetaView(f);
      return;
    }

    let h='<table>'; const curDs = focusD.toLocaleDateString('sv-SE');
    if(mode==='day'){
      h+='<tr><th style="width:60px;">限</th><th>予定</th></tr>';
      for(let p=1;p<=appConfig.periodCount;p++){ 
        const its=db.filter(x=>x.date===curDs&&String(x.period)===String(p)&&(f==='すべて'||x.targetClass===f)); 
        h+=`<tr><td><b>${p}</b></td><td onclick="if(userRole!=='生徒')openM('edit','${curDs}','${p}')">${its.map(it=>`<div class="card">${it.subject}</div>`).join('')}</td></tr>`; 
      }
    } else if(mode==='week'){
      const start=new Date(focusD); start.setDate(start.getDate()-start.getDay()+(start.getDay()===0?-6:1));
      h+='<tr><th></th>'; const dts=[]; for(let i=0;i<5;i++){ let d=new Date(start); d.setDate(start.getDate()+i); let s=d.toLocaleDateString('sv-SE'); dts.push(s); h+=`<th>${d.getMonth()+1}/${d.getDate()}</th>`; }
      h+='</tr>'; for(let p=1;p<=appConfig.periodCount;p++){ h+=`<tr><td><b>${p}</b></td>`; dts.forEach(s=>{ 
        const its=db.filter(x=>x.date===s&&String(x.period)===String(p)&&(f==='すべて'||x.targetClass===f)); 
        h+=`<td onclick="if(userRole!=='生徒')openM('edit','${s}','${p}')">${its.map(it=>`<div class="card">${it.subject}</div>`).join('')}</td>`; 
      }); h+='</tr>'; }
    }
    area.innerHTML = h+'</table>';
  }

  async function renderTaskView() {
    const area = document.getElementById('view-area');
    if (userRole === '生徒' && !currentStudentName) {
      let attOptions = ''; for(let i=1;i<=100;i++) attOptions += `<option value="${i}">${i}</option>`;
      area.innerHTML = `<div class="box-ui" style="width:100%; max-width:400px; margin:20px auto; text-align:left;"><h3>利用登録</h3><label style="font-size:11px;">出席番号</label><select id="reg-att-no" class="input-ui">${attOptions}</select><label style="font-size:11px;">氏名</label><input type="text" id="reg-name" class="input-ui" placeholder="例: 山田 太郎"><label style="font-size:11px;">メールアドレス</label><input type="email" id="reg-email" class="input-ui"><label style="font-size:11px;">パスワード</label><input type="password" id="reg-pw" class="input-ui"><button class="btn-blue" onclick="onRegisterStudent()">登録</button></div>`;
      return;
    }
    const t = await callGas('getSubmissionData', { sn: currentSchoolNo, studentName: currentStudentName, className: studentClass });
    let h = `<h3>${currentStudentName}さんの提出状況</h3><div class="menu-grid">`;
    t.forEach(tk => { const isD=(tk.status==='完了'); h += `<div class="dashboard-card" onclick="onToggleStatus('${tk.taskKey}','${tk.status}')"><div style="font-size:24px; margin-right:15px; color:${isD?'green':'red'};"><i class="fa-solid ${isD?'fa-check-circle':'fa-circle'}"></i></div><div><b>${tk.subject}</b><br><small>締切:${tk.date}</small></div></div>`; });
    area.innerHTML = h + '</div>';
  }

  async function loadMatrixData(){
    const f=document.getElementById('sidebar-class-filter').value; adminSubMode='matrix'; render();
    if(!selectedSubject && appConfig.subjectList.length) selectedSubject = appConfig.subjectList[0];
    const d = await callGas('getMatrixData', { sn: currentSchoolNo, className: f, subName: selectedSubject });
    const meta = await callGas('getSubmissionMeta', { sn: currentSchoolNo, className: f, subName: selectedSubject });
    meta.forEach((x,i)=>{ const el=document.getElementById('th-task-'+i); if(el) el.innerText=x.subject||'--'; });
    document.getElementById('matrix-tbody').innerHTML=d.matrix.map(row=>`<tr><td>${row.no}</td><td><input type="text" value="${row.name}" class="row-name" data-no="${row.no}" style="width:100%; border:none; background:transparent;"></td>${row.checks.map(c=>`<td><input type="checkbox" ${c?'checked':''} disabled></td>`).join('')}</tr>`).join('');
  }

  function renderMatrixView(cl){
    document.getElementById('view-area').innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:15px;"><button onclick="adminSubMode='menu';render();" class="btn-blue" style="width:80px; background:gray; padding:5px;">戻る</button><select class="input-ui" style="width:200px;" onchange="selectedSubject=this.value; loadMatrixData();">${appConfig.subjectList.map(s=>`<option value="${s}" ${s===selectedSubject?'selected':''}>${s}</option>`).join('')}</select><button onclick="onSaveMatrix()" class="btn-blue" style="width:80px; padding:5px;">保存</button></div><table><thead><tr><th style="width:50px;">No</th><th style="width:120px;">氏名</th>${Array.from({length:10}).map((_,i)=>`<th id="th-task-${i}">--</th>`).join('')}</tr></thead><tbody id="matrix-tbody"></tbody></table>`;
  }

  async function onSaveMatrix(){
    const rows=document.querySelectorAll('#matrix-tbody tr'), f=document.getElementById('sidebar-class-filter').value;
    const data=Array.from(rows).map(tr=>({ no:tr.querySelector('.row-name').dataset.no, name:tr.querySelector('.row-name').value }));
    await callGas('saveFullMatrix', { sn: currentSchoolNo, className: f, subName: selectedSubject, data });
    alert('保存完了');
  }

  async function loadEditMeta(){ 
    adminSubMode='edit'; render(); 
    const f=document.getElementById('sidebar-class-filter').value;
    const data = await callGas('getSubmissionMeta', { sn: currentSchoolNo, className: f, subName: selectedSubject });
    data.forEach((t, i)=>{ const idx=i+1; document.getElementById(`meta-name-${idx}`).value=t.subject; document.getElementById(`meta-date-${idx}`).value=t.date; }); 
  }

  function renderEditMetaView(cl){
    let rows=''; for(let i=1;i<=10;i++) rows+=`<div style="display:flex; gap:10px; margin-bottom:10px;"><b>${i}</b><input type="text" id="meta-name-${i}" class="input-ui" placeholder="課題名"><input type="date" id="meta-date-${i}" class="input-ui"></div>`;
    document.getElementById('view-area').innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;"><button class="btn-blue" style="width:80px; background:gray; padding:5px;" onclick="adminSubMode='menu';render();">戻る</button><select class="input-ui" style="width:200px;" onchange="selectedSubject=this.value; loadEditMeta();">${appConfig.subjectList.map(s=>`<option value="${s}" ${s===selectedSubject?'selected':''}>${s}</option>`).join('')}</select><button class="btn-blue" style="width:80px; padding:5px;" onclick="onSaveMeta()">保存</button></div>${rows}`;
  }

  async function onSaveMeta(){
    const f=document.getElementById('sidebar-class-filter').value; const list=[]; 
    for(let i=1;i<=10;i++) list.push({subject:document.getElementById(`meta-name-${i}`).value, date:document.getElementById(`meta-date-${i}`).value});
    await callGas('saveSubmissionMeta', { sn: currentSchoolNo, className: f, subName: selectedSubject, list });
    alert('保存完了');
  }

  async function onSave(){ await callGas('saveEntry', { sn: currentSchoolNo, d: window.curE.d, p: window.curE.p, s: document.getElementById('m-subject').value, r: document.getElementById('m-room').value, role: userRole, cl: document.getElementById('sidebar-class-filter').value }); closeM(); refresh(); }
  async function onDelete(){ await callGas('deleteEntry', { sn: currentSchoolNo, d: window.curE.d, p: window.curE.p, cl: document.getElementById('sidebar-class-filter').value }); closeM(); refresh(); }
  async function onRegisterStudent() {
    const res = await callGas('saveStudentIdentity', { sn: currentSchoolNo, className: studentClass, name: document.getElementById('reg-name').value, attNo: document.getElementById('reg-att-no').value, pw: document.getElementById('reg-pw').value, email: document.getElementById('reg-email').value });
    currentStudentName=res.name; currentStudentAttNo=res.attNo; localStorage.setItem("studentName", res.name); localStorage.setItem("studentAttNo", res.attNo); render();
  }
  async function onToggleStatus(tk,st){ if(userRole!=='生徒')return; await callGas('toggleTaskStatus', { sn: currentSchoolNo, tk, studentName: currentStudentName, st }); renderTaskView(); }
  function move(s){ focusD.setDate(focusD.getDate()+s*(mode==='week'?7:1)); render(); }
  function changeV(v){ mode=v; adminSubMode='menu'; render(); }
  async function onAddSubject(){ await callGas('addSubject', { sn: currentSchoolNo, name: document.getElementById('new-sub-name').value }); loadSubjects(); refresh(); }
  async function loadSubjects(){ const list = await callGas('getFullAppData', { sn: currentSchoolNo }); document.getElementById('sub-list-box').innerHTML=list.subjectList.map(s=>`<div>${s}</div>`).join(''); }
  async function onAddClass(){ await callGas('addClass', { sn: currentSchoolNo, n: document.getElementById('nc-name').value }); refresh(); }
  async function doSetup(){ 
    const res = await callGas('processInitialSetup', { schoolName:document.getElementById('s-school').value, adminId:document.getElementById('s-admin-id').value, adminPw:document.getElementById('s-admin-pw').value });
    document.getElementById('res-school-no').innerText=res.schoolNumber; showSection('complete'); 
  }
</script>
</body>
</html>
