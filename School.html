<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* CSSはご提示いただいたものを使用（省略せず記述してください） */
    :root { --primary: #3b82f6; --bg: #f8fafc; --dark: #1e293b; --danger: #ef4444; --header-bg: #1e293b; --card-bg: #dbeafe; --card-text: #1e40af; --pink: #d63384; --btn-radius: 8px; }
    #landing-box, #setup-box, #complete-box, #login-box, #app-box, .modal-overlay { display: none; }
    body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--dark); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; transition: 0.3s; }
    .box-ui { background: white; padding: 30px; border-radius: 15px; width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); color: #333; }
    .input-ui { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .btn-blue { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: var(--btn-radius); cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-pink { width: 100%; padding: 10px; background: var(--pink); color: white; border: none; border-radius: var(--btn-radius); cursor: pointer; font-weight: bold; margin-top: 10px; }
    #app-box { width: 98%; height: 96vh; background: white; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: var(--header-bg); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .main-content { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 260px; background: #fff; border-right: 1px solid #eee; padding: 15px; overflow-y: auto; color: #333; }
    .view-area { flex: 1; padding: 15px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
    .card { padding: 5px; border-radius: 4px; border-left: 4px solid var(--primary); font-size: 11px; text-align: left; background: var(--card-bg); color: var(--card-text); cursor: pointer; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .modal { background: white; padding: 25px; border-radius: 15px; width: 380px; color: #333; }
  </style>
</head>
<body class="theme-default">

  <!-- ログイン画面 -->
  <div id="login-box" class="box-ui" style="display:block;">
    <h3>School Login</h3>
    <input type="number" id="l-school-no" class="input-ui" placeholder="6桁の学校番号" oninput="handleSchoolNoInput(this.value)">
    <select id="l-role" class="input-ui" onchange="onRoleChange()">
      <option value="生徒">生徒</option>
      <option value="教員">教員</option>
      <option value="管理者">管理者</option>
    </select>
    <div id="uid-select-wrapper"><select id="uid-select" class="input-ui"></select></div>
    <div id="uid-text-wrapper" style="display:none;"><input type="text" id="uid-text" class="input-ui" placeholder="ユーザーID"></div>
    <div id="pw-area"><input type="password" id="upw" class="input-ui" placeholder="パスワード"></div>
    <button class="btn-blue" onclick="doLogin()">ログイン</button>
  </div>

  <!-- メインアプリ画面 -->
  <div id="app-box">
    <div class="header">
      <div id="h-school-name">---</div>
      <div id="digital-clock">00:00:00</div>
      <div>
        <button onclick="changeV('day')" class="btn-blue" style="width:auto; display:inline;">日</button>
        <button onclick="changeV('week')" class="btn-blue" style="width:auto; display:inline;">週</button>
        <button onclick="location.reload()" class="btn-pink" style="width:auto; display:inline;">ログアウト</button>
      </div>
    </div>
    <div class="main-content">
      <div class="sidebar">
        <label>表示クラス</label>
        <select id="sidebar-class-filter" class="input-ui" onchange="render()"></select>
        <hr>
        <button class="btn-blue" onclick="openM('chat')">制作へ連絡</button>
        <button class="btn-blue" onclick="openM('time')">時刻設定</button>
        <button class="btn-blue" onclick="openM('user')">ユーザー管理</button>
        <div id="side-task">
          <label>提出物登録</label>
          <input type="date" id="task-date" class="input-ui">
          <input type="text" id="task-subject" class="input-ui" placeholder="科目名">
          <input type="text" id="task-content" class="input-ui" placeholder="内容">
          <select id="task-class-select" class="input-ui"></select>
          <button class="btn-pink" onclick="onSaveTask()">登録</button>
        </div>
      </div>
      <div id="view-area" class="view-area"></div>
    </div>
  </div>

  <!-- モーダル各種 -->
  <div class="modal-overlay" id="overlay-edit"><div class="modal"><h3>編集</h3><input type="text" id="m-subject" class="input-ui"><input type="text" id="m-room" class="input-ui"><button class="btn-blue" onclick="onSave()">保存</button><button class="btn-pink" onclick="onDelete()">削除</button><button onclick="closeM()">閉じる</button></div></div>
  <div class="modal-overlay" id="overlay-chat"><div class="modal"><h3>チャット</h3><div id="chat-container"></div><input type="text" id="chat-input" class="input-ui"><button class="btn-blue" onclick="onSendChat()">送信</button><button onclick="closeM()">閉じる</button></div></div>
  <div class="modal-overlay" id="overlay-user"><div class="modal"><h3>管理</h3><input type="text" id="nu-id" class="input-ui" placeholder="ID"><input type="text" id="nu-pw" class="input-ui" placeholder="PW"><select id="nu-role" class="input-ui"><option value="教員">教員</option><option value="管理者">管理者</option></select><button class="btn-blue" onclick="onAddUser()">保存</button><div id="user-list-box"></div><button onclick="closeM()">閉じる</button></div></div>
  <div class="modal-overlay" id="overlay-time"><div class="modal"><h3>時刻設定</h3>限数:<input type="number" id="tc-count" class="input-ui"><table id="tc-tbody"></table><button class="btn-blue" onclick="onSaveTimeConfig()">保存</button><button onclick="closeM()">閉じる</button></div></div>

<script>
  // --- 通信用URLをここに貼る ---
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyoRU0VX3GQ5CvpzLcdvFKyjI0OBBUsm2D2cdsULK0iHX712HdeSmSXUDOGFIJFcvnMNg/exec"; 

  async function callGas(action, data = {}) {
    const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action, data }) });
    return await res.json();
  }

  let db=[], tasks=[], appConfig={}, focusD=new Date(), mode='week', userRole="生徒", currentSchoolNo="", studentClass="";

  function showSection(s){ document.querySelectorAll('.box-ui, #app-box, .modal-overlay').forEach(el=>el.style.display='none'); const t=document.getElementById(s+'-box'); if(t) t.style.display=(s==='app'?'flex':'block'); }
  function openM(m){ document.getElementById('overlay-'+m).style.display='flex'; if(m==='chat') refreshChat(); if(m==='user') loadUsers(); }
  function closeM(){ document.querySelectorAll('.modal-overlay').forEach(el=>el.style.display='none'); }

  async function handleSchoolNoInput(val) {
    if(val.length===6) {
      const c = await callGas('getLoginConfig', { sn: val });
      document.getElementById('uid-select').innerHTML = c.classList.map(x=>`<option value="${x}">${x}</option>`).join('');
    }
  }

  async function doLogin() {
    const sn=document.getElementById('l-school-no').value, r=document.getElementById('l-role').value, pw=document.getElementById('upw').value;
    let id=(r==='生徒'?document.getElementById('uid-select').value : document.getElementById('uid-text').value);
    const res = await callGas('checkLogin', { sn, id, pw, role: r });
    if(res.success){
      userRole=r; currentSchoolNo=sn; studentClass=(r==='生徒'?id:"");
      showSection('app'); document.getElementById('h-school-name').innerText=res.schoolName;
      refresh();
    } else alert(res.message);
  }

  async function refresh() {
    appConfig = await callGas('getFullAppData', { sn: currentSchoolNo });
    db = await callGas('getScheduleData', { sn: currentSchoolNo });
    tasks = await callGas('getSubmissionData', { sn: currentSchoolNo });
    const sSelect = document.getElementById('sidebar-class-filter');
    sSelect.innerHTML = '<option value="すべて">すべて</option>' + appConfig.classList.map(c=>`<option value="${c}">${c}</option>`).join('');
    document.getElementById('task-class-select').innerHTML = appConfig.classList.map(c=>`<option value="${c}">${c}</option>`).join('');
    render();
  }

  function render() {
    const area=document.getElementById('view-area'), f=(userRole==='生徒'?studentClass:document.getElementById('sidebar-class-filter').value);
    const start=new Date(focusD); start.setDate(start.getDate()-start.getDay()+1);
    let h='<table><tr><th></th>';
    for(let i=0;i<5;i++){ let d=new Date(start); d.setDate(start.getDate()+i); h+=`<th>${d.getMonth()+1}/${d.getDate()}</th>`; }
    h+='</tr>';
    for(let p=1; p<=appConfig.periodCount; p++){
      h+=`<tr><td>${p}限</td>`;
      for(let i=0;i<5;i++){
        let d=new Date(start); d.setDate(start.getDate()+i); let s=d.toLocaleDateString('sv-SE');
        const its=db.filter(x=>x.date===s && String(x.period)===String(p) && (f==='すべて'||x.targetClass===f));
        h+=`<td onclick="openE('${s}',${p})">${its.map(it=>`<div class="card">${it.subject}</div>`).join('')}</td>`;
      }
      h+='</tr>';
    }
    area.innerHTML = h+'</table>';
  }

  function openE(d,p){
    if(userRole==='生徒') return;
    openM('edit'); window.curE={d,p};
  }

  async function onSave(){ await callGas('saveEntry', { sn: currentSchoolNo, d:window.curE.d, p:window.curE.p, s:document.getElementById('m-subject').value, r:document.getElementById('m-room').value, role:userRole, cl:document.getElementById('sidebar-class-filter').value }); closeM(); refresh(); }
  async function onDelete(){ await callGas('deleteEntry', { sn: currentSchoolNo, d:window.curE.d, p:window.curE.p, cl:document.getElementById('sidebar-class-filter').value }); closeM(); refresh(); }
  async function onSaveTask(){ await callGas('saveSubmission', { sn: currentSchoolNo, date:document.getElementById('task-date').value, subject:document.getElementById('task-subject').value, content:document.getElementById('task-content').value, targetClass:document.getElementById('task-class-select').value }); refresh(); }
  async function loadUsers(){ const list = await callGas('getUserList', { sn: currentSchoolNo }); document.getElementById('user-list-box').innerHTML = list.map(u=>`<div>${u.id}</div>`).join(''); }
  async function onAddUser(){ await callGas('saveUser', { sn: currentSchoolNo, id: document.getElementById('nu-id').value, pw: document.getElementById('nu-pw').value, role: document.getElementById('nu-role').value }); loadUsers(); }
  function onRoleChange(){ const r=document.getElementById('l-role').value; document.getElementById('uid-text-wrapper').style.display=(r==='生徒'?'none':'block'); document.getElementById('uid-select-wrapper').style.display=(r==='生徒'?'block':'none'); }
  function changeV(v){ mode=v; render(); }
  setInterval(() => { document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
